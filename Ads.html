<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>للإعلانات والشراكة - Memo Fans Call</title>

    <!-- Google Fonts for Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #0a0a0a;
            --black-light: #111111;
            --black-card: #1a1a1a;
            --gold: #d4a843;
            --gold-light: #e8c96a;
            --gold-dark: #b8942e;
            --gold-glow: rgba(212, 168, 67, 0.3);
            --gold-glow-strong: rgba(212, 168, 67, 0.6);
            --white: #f5f0e8;
            --gray: #a0a0a0;
            --gray-light: #c0c0c0;
            --border-gold: rgba(212, 168, 67, 0.25);
            --border-gold-strong: rgba(212, 168, 67, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            font-family: 'Tajawal', 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === الخلفية المتحركة - جزيئات ذهبية === */
        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            animation: floatUp linear infinite;
            box-shadow: 0 0 6px var(--gold-glow-strong), 0 0 12px var(--gold-glow);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) translateX(0) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                transform: translateY(75vh) translateX(30px) scale(1);
                opacity: 0.9;
            }
            40% {
                transform: translateY(40vh) translateX(-20px) scale(0.7);
                opacity: 0.6;
            }
            70% {
                transform: translateY(15vh) translateX(15px) scale(0.3);
                opacity: 0.25;
            }
            100% {
                transform: translateY(-10vh) translateX(-10px) scale(0);
                opacity: 0;
            }
        }

        /* === خطوط ذهبية رفيعة في الخلفية === */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            background:
                linear-gradient(30deg, transparent 49.5%, #d4a843 49.5%, #d4a843 50.5%, transparent 50.5%) 0 0 / 80px 80px,
                linear-gradient(-30deg, transparent 49.5%, #d4a843 49.5%, #d4a843 50.5%, transparent 50.5%) 0 0 / 80px 80px;
        }

        /* === هالة ذهبية خلف الكارد === */
        .glow-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 650px;
            height: 650px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulseAura 4s ease-in-out infinite;
        }

        @keyframes pulseAura {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0.4;
            }
        }

        /* === الحاوية الرئيسية === */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 620px;
            padding: 20px;
            margin: 20px;
        }

        /* === الكارد === */
        .card {
            background: var(--black-card);
            border: 1px solid var(--border-gold);
            border-radius: 24px;
            padding: 50px 40px 45px;
            text-align: center;
            position: relative;
            box-shadow:
                0 0 60px rgba(0, 0, 0, 0.8),
                0 0 120px var(--gold-glow),
                inset 0 1px 0 var(--border-gold-strong);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 30px;
            right: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.8;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 30px;
            right: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            opacity: 0.5;
        }

        /* زوايا ذهبية مزخرفة */
        .corner-decoration {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 2;
        }
        .corner-decoration.top-right {
            top: 16px;
            right: 16px;
            border-top: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
            border-radius: 0 10px 0 0;
        }
        .corner-decoration.top-left {
            top: 16px;
            left: 16px;
            border-top: 2px solid var(--gold);
            border-left: 2px solid var(--gold);
            border-radius: 10px 0 0 0;
        }
        .corner-decoration.bottom-right {
            bottom: 16px;
            right: 16px;
            border-bottom: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
            border-radius: 0 0 10px 0;
        }
        .corner-decoration.bottom-left {
            bottom: 16px;
            left: 16px;
            border-bottom: 2px solid var(--gold);
            border-left: 2px solid var(--gold);
            border-radius: 0 0 0 10px;
        }

        /* === أيقونة التاج أو النجمة === */
        .icon-crown {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e1a10, #1a1508);
            border: 2px solid var(--gold);
            margin-bottom: 28px;
            position: relative;
            box-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(212, 168, 67, 0.15);
            animation: iconGlow 3s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%,
            100% {
                box-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(212, 168, 67, 0.15);
            }
            50% {
                box-shadow: 0 0 45px var(--gold-glow-strong), 0 0 80px rgba(212, 168, 67, 0.3);
            }
        }

        .icon-crown svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.8;
        }

        /* === الوسم العلوي === */
        .badge {
            display: inline-block;
            background: rgba(212, 168, 67, 0.08);
            border: 1px solid var(--border-gold);
            border-radius: 50px;
            padding: 7px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* === العنوان === */
        .title {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--white);
            margin-bottom: 8px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .title .gold-text {
            color: var(--gold);
            display: inline;
            position: relative;
        }

        .title .gold-text::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
            opacity: 0.5;
        }

        /* === النص الفرعي === */
        .subtitle {
            font-size: 1.05rem;
            color: var(--gray-light);
            margin-bottom: 30px;
            font-weight: 500;
            line-height: 1.7;
        }

        .subtitle .highlight {
            color: var(--gold-light);
            font-weight: 700;
        }

        /* === صندوق البريد === */
        .email-box {
            background: #0d0d0d;
            border: 1.5px solid var(--border-gold-strong);
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 20px;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .email-box:hover {
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold-glow), inset 0 0 25px rgba(212, 168, 67, 0.04);
            transform: translateY(-2px);
        }

        .email-box .email-icon {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(212, 168, 67, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-gold);
        }

        .email-box .email-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--gold);
            fill: none;
            stroke-width: 1.8;
        }

        .email-box .email-address {
            flex: 1;
            font-family: 'Cairo', 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #e0d5c0;
            text-align: left;
            direction: ltr;
            letter-spacing: 0.3px;
            word-break: break-all;
            transition: color 0.3s;
        }

        .email-box:hover .email-address {
            color: var(--gold-light);
        }

        /* === زر النسخ === */
        .btn-copy {
            flex-shrink: 0;
            background: linear-gradient(135deg, #1f1a0c, #2a2210);
            border: 1.5px solid var(--gold-dark);
            color: var(--gold-light);
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .btn-copy::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            opacity: 0;
            transition: opacity 0.35s ease;
            border-radius: 12px;
            z-index: 0;
        }

        .btn-copy:hover::before {
            opacity: 1;
        }

        .btn-copy:hover {
            border-color: var(--gold);
            color: #0a0a0a;
            box-shadow: 0 8px 30px var(--gold-glow), 0 0 50px rgba(212, 168, 67, 0.25);
            transform: translateY(-3px);
        }

        .btn-copy:active {
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }

        .btn-copy span,
        .btn-copy svg {
            position: relative;
            z-index: 1;
            transition: color 0.35s ease, stroke 0.35s ease;
        }
        .btn-copy svg {
            stroke: var(--gold-light);
            transition: stroke 0.35s ease;
        }
        .btn-copy:hover svg {
            stroke: #0a0a0a;
        }

        /* === رسالة النسخ === */
        .copy-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a0a;
            border: 1px solid var(--gold);
            color: var(--gold-light);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 10px 40px var(--gold-glow-strong);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            opacity: 0;
        }
        .copy-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* === المزايا الصغيرة === */
        .features {
            display: flex;
            gap: 16px;
            margin-top: 26px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--gray);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }
        .feature-item:hover {
            border-color: var(--border-gold);
            color: var(--gold-light);
            background: rgba(212, 168, 67, 0.04);
        }
        .feature-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--gold-glow-strong);
        }

        /* === تجاوب === */
        @media (max-width: 600px) {
            .card {
                padding: 35px 20px 30px;
                border-radius: 20px;
            }
            .title {
                font-size: 1.5rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .email-box {
                flex-direction: column;
                gap: 12px;
                padding: 16px 14px;
            }
            .email-box .email-address {
                text-align: center;
                font-size: 0.85rem;
            }
            .btn-copy {
                width: 100%;
                justify-content: center;
                padding: 13px;
            }
            .features {
                gap: 10px;
            }
            .feature-item {
                font-size: 0.72rem;
                padding: 6px 12px;
            }
            .corner-decoration {
                width: 28px;
                height: 28px;
            }
            .corner-decoration.top-right {
                top: 10px;
                right: 10px;
            }
            .corner-decoration.top-left {
                top: 10px;
                left: 10px;
            }
            .corner-decoration.bottom-right {
                bottom: 10px;
                right: 10px;
            }
            .corner-decoration.bottom-left {
                bottom: 10px;
                left: 10px;
            }
            .icon-crown {
                width: 56px;
                height: 56px;
                margin-bottom: 20px;
            }
            .icon-crown svg {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
<body>

    <!-- الخلفية: جزيئات ذهبية متحركة -->
    <div class="particles-bg" id="particlesBg"></div>

    <!-- خطوط خلفية -->
    <div class="bg-lines"></div>

    <!-- هالة ذهبية -->
    <div class="glow-aura"></div>

    <!-- توست رسالة النسخ -->
    <div class="copy-toast" id="copyToast">✅ تم نسخ البريد الإلكتروني بنجاح</div>

    <!-- الحاوية الرئيسية -->
    <div class="main-container">
        <div class="card">

            <!-- زوايا مزخرفة -->
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration bottom-right"></div>
            <div class="corner-decoration bottom-left"></div>

            <!-- أيقونة -->
            <div class="icon-crown">
                <!-- أيقونة نجمة / تاج -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="12,2 14.5,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9.5,9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                </svg>
            </div>

            <!-- وسم -->
            <div class="badge">✦ فرص إعلانية مميزة ✦</div>

            <!-- العنوان -->
            <h1 class="title">
                للتواصل من أجل<br>
                <span class="gold-text">الإعلانات والشراكة</span>
            </h1>

            <!-- النص الفرعي -->
            <p class="subtitle">
                نحن نرحب بجميع <span class="highlight">المعلنين والشركاء</span> المهتمين بالتعاون معنا.<br>
                تواصل معنا عبر البريد الإلكتروني أدناه، وسنرد عليك في أقرب وقت ممكن.
            </p>

            <!-- صندوق البريد -->
            <div class="email-box" id="emailBox">
                <div class="email-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        <polyline points="2,7 12,14 22,7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="email-address">memo.fans.call@gmail.com</span>
                <button class="btn-copy" id="btnCopy" title="نسخ البريد الإلكتروني">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <span>نسخ</span>
                </button>
            </div>

            <!-- مزايا -->
            <div class="features">
                <div class="feature-item">
                    <span class="feature-dot"></span> رد سريع
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span> أسعار تنافسية
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span> شراكة موثوقة
                </div>
                <div class="feature-item">
                    <span class="feature-dot"></span> دعم احترافي
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ إنشاء الجزيئات الذهبية المتحركة ============
        const particlesBg = document.getElementById('particlesBg');
        const particleCount = 35;

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            // حجم عشوائي بين 2px و 7px
            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            // موقع أفقي عشوائي
            particle.style.left = Math.random() * 100 + '%';

            // مدة الحركة بين 6 و 14 ثانية
            const duration = Math.random() * 8 + 6;
            particle.style.animationDuration = duration + 's';

            // تأخير عشوائي
            particle.style.animationDelay = Math.random() * 12 + 's';

            // شفافية عشوائية
            particle.style.opacity = '0';

            particlesBg.appendChild(particle);

            // إزالة الجسيم بعد انتهاء الأنيميشن وإعادة إنشائه
            const totalDuration = parseFloat(duration) + parseFloat(particle.style.animationDelay);
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.remove();
                    createParticle();
                }
            }, totalDuration * 1000);
        }

        // إنشاء الدفعة الأولى
        for (let i = 0; i < particleCount; i++) {
            setTimeout(() => createParticle(), i * 180);
        }

        // إنشاء جسيم جديد كل فترة للحفاظ على الكثافة
        setInterval(() => {
            if (particlesBg.children.length < particleCount + 10) {
                createParticle();
            }
        }, 1500);

        // ============ نسخ البريد الإلكتروني ============
        const btnCopy = document.getElementById('btnCopy');
        const copyToast = document.getElementById('copyToast');
        const emailAddress = 'memo.fans.call@gmail.com';
        let toastTimer;

        btnCopy.addEventListener('click', async () => {
            try {
                // استخدام Clipboard API الحديثة
                await navigator.clipboard.writeText(emailAddress);

                // إظهار رسالة النجاح
                showToast('✅ تم نسخ البريد الإلكتروني بنجاح');

                // تأثير بصري على الزر
                btnCopy.classList.add('copied');
                const originalHTML = btnCopy.innerHTML;
                btnCopy.innerHTML = `
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polyline points="4,12 9,17 20,6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>تم النسخ</span>
                        `;

                // إعادة الزر لوضعه الأصلي بعد 2 ثانية
                setTimeout(() => {
                    btnCopy.innerHTML = originalHTML;
                    btnCopy.classList.remove('copied');
                }, 2000);

            } catch (err) {
                // fallback للمتصفحات القديمة
                fallbackCopy(emailAddress);
            }
        });

        // دالة احتياطية للنسخ
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ تم نسخ البريد الإلكتروني بنجاح');
            } catch (e) {
                showToast('⚠️ الرجاء نسخ البريد يدوياً');
            }
            document.body.removeChild(textarea);
        }

        // إظهار التوست
        function showToast(message) {
            // تحديث الرسالة
            copyToast.textContent = message;

            // إلغاء التايمر السابق
            if (toastTimer) clearTimeout(toastTimer);

            // إظهار التوست
            copyToast.classList.add('show');

            // إخفاء بعد 2.5 ثانية
            toastTimer = setTimeout(() => {
                copyToast.classList.remove('show');
            }, 2500);
        }

        // ============ تأثير النقر على صندوق البريد أيضاً ============
        const emailBox = document.getElementById('emailBox');
        emailBox.addEventListener('click', function(e) {
            // لا تنشط إذا كان النقر على زر النسخ نفسه
            if (e.target.closest('#btnCopy')) return;
            // محاكاة النقر على زر النسخ
            btnCopy.click();
        });
        emailBox.style.cursor = 'pointer';
    </script>
</body>
</html>
